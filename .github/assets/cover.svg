<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#0b1620"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbe9f5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="titleGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.024  0 0 0 0 0.714  0 0 0 0 0.831  0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.45">
    <path d="M0 157 H1200 M0 314 H1200 M0 471 H1200"/>
    <path d="M200 0 V628 M400 0 V628 M600 0 V628 M800 0 V628 M1000 0 V628"/>
  </g>

  <!-- glow accent -->
  <ellipse cx="940" cy="320" rx="540" ry="340" fill="url(#glow)" opacity="0.7"/>

  <!-- flowing lines (the "misina" — fishing line / data stream metaphor) -->
  <g fill="none" filter="url(#soft)">
    <path d="M-50 350 C 200 250, 400 480, 700 320 S 1100 220, 1300 360" stroke="url(#line)" stroke-width="3.5"/>
    <path d="M-50 380 C 220 320, 420 510, 720 360 S 1120 270, 1300 400" stroke="url(#line2)" stroke-width="2.5"/>
    <path d="M-50 420 C 240 380, 440 540, 740 400 S 1140 320, 1300 450" stroke="url(#line2)" stroke-width="1.75" opacity="0.6"/>
    <path d="M-50 460 C 260 440, 460 580, 760 440 S 1160 380, 1300 500" stroke="url(#line2)" stroke-width="1.25" opacity="0.4"/>
  </g>

  <!-- node dots along the main line -->
  <g fill="#22d3ee">
    <circle cx="180" cy="289" r="6"/>
    <circle cx="420" cy="385" r="6"/>
    <circle cx="700" cy="320" r="8"/>
    <circle cx="980" cy="252" r="6"/>
  </g>

  <!-- category eyebrow -->
  <text x="80" y="148"
        font-family="'Inter', 'SF Pro Display', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="600" fill="#67e8f9" letter-spacing="8" opacity="0.9">HTTP CLIENT · TS · ZERO-DEPS</text>

  <!-- name -->
  <text x="80" y="320"
        font-family="'Inter', 'SF Pro Display', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="216" font-weight="900" fill="url(#title)" letter-spacing="-7"
        filter="url(#titleGlow)">misina</text>

  <!-- tagline -->
  <text x="80" y="392"
        font-family="'Inter', 'SF Pro Display', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="40" font-weight="600" fill="#e2e8f0" letter-spacing="-0.8">Driver-based, fetch-first HTTP client.</text>
  <text x="80" y="438"
        font-family="'Inter', 'SF Pro Display', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="500" fill="#94a3b8" letter-spacing="-0.3">Hooks · Retry · Redirect policy · Web Fetch API.</text>

  <!-- runtimes badge row -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace"
     font-size="17" font-weight="600" fill="#cbd5e1">
    <g>
      <rect x="80" y="510" width="100" height="40" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.25"/>
      <text x="130" y="536" text-anchor="middle">Node 20+</text>
    </g>
    <g>
      <rect x="190" y="510" width="68" height="40" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.25"/>
      <text x="224" y="536" text-anchor="middle">Bun</text>
    </g>
    <g>
      <rect x="268" y="510" width="76" height="40" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.25"/>
      <text x="306" y="536" text-anchor="middle">Deno</text>
    </g>
    <g>
      <rect x="354" y="510" width="124" height="40" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.25"/>
      <text x="416" y="536" text-anchor="middle">CF Workers</text>
    </g>
    <g>
      <rect x="488" y="510" width="116" height="40" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.25"/>
      <text x="546" y="536" text-anchor="middle">Browsers</text>
    </g>
  </g>

  <!-- bottom-right brand mark -->
  <g transform="translate(1010, 535)">
    <circle r="10" fill="#06b6d4"/>
    <text x="26" y="6"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace"
          font-size="17" font-weight="600" fill="#cbd5e1" letter-spacing="2">productdevbook</text>
  </g>
</svg>
